name: Deploy to Hugging Face Space

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "HF_TOKEN is not set."
            exit 1
          fi
          if [ -z "${HF_SPACE_REPO}" ]; then
            echo "HF_SPACE_REPO is not set (expected format: username/space-name)."
            exit 1
          fi
          echo "Raw deploy target: ${HF_SPACE_REPO}"

      - name: Normalize Space repo path
        id: normalize
        run: |
          SPACE_REPO="${HF_SPACE_REPO}"
          SPACE_REPO="${SPACE_REPO#https://huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO#http://huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO#huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO%.git}"

          if [[ "${SPACE_REPO}" != */* ]]; then
            echo "Invalid HF_SPACE_REPO after normalization: '${SPACE_REPO}'"
            echo "Expected format: owner/space-name"
            exit 1
          fi

          echo "space_repo=${SPACE_REPO}" >> "$GITHUB_OUTPUT"
          echo "Normalized deploy target: ${SPACE_REPO}"

      # CI already runs tests in a separate workflow; deployment should remain fast and deterministic.
      - name: Verify Hugging Face Space access
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git ls-remote "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${{ steps.normalize.outputs.space_repo }}" >/dev/null \
          || (echo "Cannot access Space repo. Check HF_TOKEN scope and HF_SPACE_REPO value." && exit 1)

      - name: Sync repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${{ steps.normalize.outputs.space_repo }}" hf_space

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".mypy_cache" \
            --exclude ".ruff_cache" \
            --exclude ".hf" \
            --exclude "hf_space" \
            --exclude "tests" \
            --exclude "artifacts" \
            ./ hf_space/

          cp .hf/README.md hf_space/README.md

          cd hf_space
          git add .
          git commit -m "Deploy from GitHub: ${GITHUB_SHA}" || echo "No changes to commit"
          git push
