name: Deploy to Hugging Face Space

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "HF_TOKEN is not set."
            exit 1
          fi
          if [ -z "${HF_SPACE_REPO}" ]; then
            echo "HF_SPACE_REPO is not set (expected format: username/space-name)."
            exit 1
          fi
          echo "Raw deploy target: ${HF_SPACE_REPO}"

      - name: Normalize Space repo path
        id: normalize
        run: |
          SPACE_REPO="${HF_SPACE_REPO}"
          SPACE_REPO="${SPACE_REPO#https://huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO#http://huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO#huggingface.co/spaces/}"
          SPACE_REPO="${SPACE_REPO%.git}"

          if [[ "${SPACE_REPO}" != */* ]]; then
            echo "Invalid HF_SPACE_REPO after normalization: '${SPACE_REPO}'"
            echo "Expected format: owner/space-name"
            exit 1
          fi

          echo "space_repo=${SPACE_REPO}" >> "$GITHUB_OUTPUT"
          echo "Normalized deploy target: ${SPACE_REPO}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment dependencies
        run: |
          python --version
          python -m pip --version
          python -m pip install --upgrade pip
          pip install "huggingface_hub>=0.24.0"

      - name: Validate Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"].strip()
          api = HfApi(token=token)
          who = api.whoami(token=token)
          print(f"Authenticated as: {who.get('name', 'unknown')}")
          PY

      - name: Ensure target Space exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_REPO: ${{ steps.normalize.outputs.space_repo }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          from huggingface_hub.utils import HfHubHTTPError

          token = os.environ["HF_TOKEN"].strip()
          repo_id = os.environ["SPACE_REPO"].strip()
          api = HfApi(token=token)

          try:
            info = api.repo_info(repo_id=repo_id, repo_type="space")
            print(f"Target Space confirmed: {info.id}")
          except HfHubHTTPError as exc:
            status = getattr(getattr(exc, "response", None), "status_code", None)
            if status == 404:
              print(f"Space not found. Creating: {repo_id}")
              info = api.create_repo(
                repo_id=repo_id,
                repo_type="space",
                space_sdk="docker",
                private=False,
                exist_ok=True,
                token=token,
              )
              print(f"Created Space: {info.repo_id}")
            else:
              raise
          PY

      - name: Prepare deploy bundle
        env:
          BUNDLE_DIR: ${{ runner.temp }}/hf_space_bundle
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          workspace = Path(".").resolve()
          bundle_dir = Path(os.environ["BUNDLE_DIR"])
          if bundle_dir.exists():
            shutil.rmtree(bundle_dir, ignore_errors=True)

          ignore_names = {
            ".git",
            ".github",
            ".venv",
            "__pycache__",
            ".pytest_cache",
            ".mypy_cache",
            ".ruff_cache",
            ".hf",
            "tests",
            "artifacts",
          }

          def _ignore(path, names):
            return [name for name in names if name in ignore_names]

          shutil.copytree(workspace, bundle_dir, ignore=_ignore)

          hf_readme = workspace / ".hf" / "README.md"
          if hf_readme.exists():
            shutil.copyfile(hf_readme, bundle_dir / "README.md")

          print(f"Bundle prepared at: {bundle_dir}")
          PY

      - name: Upload repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_REPO: ${{ steps.normalize.outputs.space_repo }}
          BUNDLE_DIR: ${{ runner.temp }}/hf_space_bundle
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"].strip()
          repo_id = os.environ["SPACE_REPO"].strip()
          folder_path = os.environ["BUNDLE_DIR"]

          api = HfApi(token=token)
          api.upload_folder(
            repo_id=repo_id,
            repo_type="space",
            folder_path=folder_path,
            commit_message=f"Deploy from GitHub: {os.environ.get('GITHUB_SHA', 'manual')}",
          )
          print(f"Deployed successfully to https://huggingface.co/spaces/{repo_id}")
          PY
